@if (opened()) {
  <div class="modal-window" (click)="onBackdropClick($event)">
    <div class="panel modal-window__dialog" role="dialog" aria-modal="true" [attr.aria-label]="title()">
      <div class="modal-window__header">
        <div>
          <span class="eyebrow">Форма</span>
          <h3>{{ title() }}</h3>
          @if (description()) {
            <p>{{ description() }}</p>
          }
        </div>

        <button
          class="button button--ghost modal-window__close"
          type="button"
          aria-label="Закрыть"
          (click)="close.emit()"
        >
          <app-ui-icon name="close" />
        </button>
      </div>

      <div class="modal-window__content">
        <ng-content />
      </div>
    </div>
  </div>
}
