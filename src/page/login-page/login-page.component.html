<main class="login-page">
  <section class="login-page__form-wrap">
    <form class="panel login-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="login-card__header">
        <span class="eyebrow">Авторизация</span>
        <h1>Вход в систему</h1>
        <p>Введите логин и пароль, чтобы открыть рабочее пространство.</p>
      </div>

      <div class="form-field">
        <label for="login">Логин</label>
        <input
          id="login"
          type="text"
          formControlName="login"
          placeholder="Например, superadmin"
          [class.input-invalid]="fieldIsInvalid('login')"
        />
        @if (fieldIsInvalid('login')) {
          <small>Укажите логин пользователя.</small>
        }
      </div>

      <div class="form-field">
        <label for="password">Пароль</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Введите пароль"
          [class.input-invalid]="fieldIsInvalid('password')"
        />
        @if (fieldIsInvalid('password')) {
          <small>Пароль должен быть заполнен.</small>
        }
      </div>

      @if (errorMessage()) {
        <div class="form-message form-message--error">
          {{ errorMessage() }}
        </div>
      }

      <button class="button button--primary login-card__submit" type="submit" [disabled]="submitting()">
        @if (submitting()) {
          <span>Входим...</span>
        } @else {
          <span>Открыть систему</span>
        }
      </button>

    </form>
  </section>
</main>
